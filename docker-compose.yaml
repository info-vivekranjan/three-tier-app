version: "3.8"

services:
  mongo:
    image: mongo:6
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    ports:
      - "6800:6800"
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/docu-maintainer
      PORT: 6800

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:6800/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:6800/api

volumes:
  mongo-data:
