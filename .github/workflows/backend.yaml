name: backend
on:
  push:
    workflow_dispatch:

jobs:
  Test-code:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: install dependencies
        run: npm install
        working-directory: ./backend
      - name: run test
        run: npm run test
        working-directory: ./backend
