apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: three-tier-app-ingress
  namespace: "{{ .Values.namespace }}"
spec:
  ingressClassName: nginx
  rules:
    - host: three-tier-app.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 6800
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
